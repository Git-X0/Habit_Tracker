<mat-horizontal-stepper #stepper linear>
  <mat-step label="Upload JSON file">
    <ng-template matStepLabel>Upload</ng-template>
    <button mat-raised-button color="primary" (click)="fileInput.click()">
      📁 Select JSON file
    </button>
    <input
      #fileInput
      type="file"
      accept=".json"
      (change)="onFileSelected($event)"
      style="display: none"
    />
    <div *ngIf="parsedHabits.length > 0">
      <p>Loaded {{ parsedHabits.length }} habits.</p>
      <button mat-raised-button color="primary" (click)="stepper.next()">
        Next
      </button>
    </div>
  </mat-step>

  <mat-step label="Action choice">
    <ng-template matStepLabel>Choice</ng-template>
    <mat-radio-group [(ngModel)]="selectedOption" (change)="onOptionChange()">
      <mat-radio-button value="merge">
        Merge (add new {{ newHabitsCount }})
      </mat-radio-button>
      <mat-radio-button value="replace">
        Replace all ({{ parsedHabits.length }})
      </mat-radio-button>
    </mat-radio-group>

    <div class="actions">
      <button mat-button (click)="stepperClosed.emit()">Cancel</button>
      <button mat-button (click)="stepper.previous()">Back</button>
      <button mat-raised-button color="primary" (click)="finishImport()">
        Import
      </button>
    </div>
  </mat-step>
</mat-horizontal-stepper>
