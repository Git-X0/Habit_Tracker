<mat-card
  [class.positive-habit]="habit.type === 'positive'"
  [class.negative-habit]="habit.type === 'negative'"
>
  <div (click)="toggleHistory()">
    <mat-card-header>
      <mat-icon
        mat-card-avatar
        [class.positive]="habit.type === 'positive'"
        [class.negative]="habit.type === 'negative'"
        >{{ habit.type === 'positive' ? 'thumb_up' : 'thumb_down' }}</mat-icon
      >
      <mat-card-title>{{ habit.name }}</mat-card-title>
      <button mat-icon-button (click)="markAsDone()" class="done-button">
        <mat-icon>check_circle</mat-icon>
      </button>
      <button mat-icon-button (click)="onDelete()" class="delete-button">
        <mat-icon>delete</mat-icon>
      </button>
      <mat-card-subtitle>Streak: {{ habit.streak }} days</mat-card-subtitle>
    </mat-card-header>
  </div>
  <mat-card-content>
    <p>{{ habit.description }}</p>
  </mat-card-content>
  @if (showHistory) {
  <mat-card-content class="details-content">
    <div class="details-grid">
      <div class="calendar-container">
        <app-habit-calendar
          [history]="habit.history"
          [habitType]="habit.type"
        ></app-habit-calendar>
      </div>
      <div class="graph-container">
        <app-habit-graph
          [history]="habit.history"
          [habitType]="habit.type"
          [class]="habit.type"
        ></app-habit-graph>
      </div>
    </div>
  </mat-card-content>
  }
</mat-card>
