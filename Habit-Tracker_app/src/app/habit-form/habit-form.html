<div class="form-container">
  <h3>Add a new Habit</h3>
  <form [formGroup]="habitForm" (ngSubmit)="onSubmit()">
    <mat-form-field>
      <mat-label>Habit Name</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description"></textarea>
    </mat-form-field>

    <div class="centered-toggle">
      <mat-button-toggle-group formControlName="type" aria-label="Habit Type">
        <mat-button-toggle value="positive">Positive</mat-button-toggle>
        <mat-button-toggle value="negative">Negative</mat-button-toggle>
      </mat-button-toggle-group>
    </div>

    <div class="form-actions">
      <button mat-button type="button" (click)="close()">Cancel</button>
      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="!habitForm.valid"
      >
        Add Habit
      </button>
    </div>
  </form>
</div>
